name: build

on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "LICENSE"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: "go.mod"

      - name: Download dependencies
        run: go mod download

      - name: Build packages
        run: make build

